<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <div id="main">
        <div id="header">
            <h1>Tic Tac Toe</h1>
        
            </div><div id="board">
        </div>

        <div id="buttons">
            <button id="open-dialog">Play</button>
        </div>

        <dialog>
            <form id="player-info" method="dialog">

                <div class="inputs">
                    <label for="player-one-name">Player One Name:</label>
                    <input id="player-one-name" name="playerOneName" type="text" required>
                </div>
                <div class="inputs">
                    <label for="player-one-symbol">Player One Symbol:</label>
                    <input id="player-one-symbol" name="playerOneSymbol" type="text" maxlength="1" required>
                </div>

                <div class="inputs">
                    <label for="player-two-name">Player Two Name:</label>
                    <input id="player-two-name" name="playerTwoName" type="text" required>
                </div>
                <div class="inputs">
                    <label for="player-two-symbol">Player Two Symbol:</label>
                    <input id="player-two-symbol" name="playerTwoSymbol" type="text" maxlength="1" required>
                </div>

                <div id="form-buttons">
                    <button id="start-game" type="submit">Start Game</button>
                    <button id="close-dialog" type="button">Close</button>
                </div>
                <p id="error-message"></p>
            </form>
        </dialog>
        <div id="round"></div>
        <div id="score-board"></div>
        <div id="status-message"></div>
        <div id="win-message"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
